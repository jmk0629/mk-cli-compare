spring:
  application:
    name: mk-cli-compare-backend
  profiles:
    active: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none       # Flyway 가 스키마 단독 권한자.
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# 프론트엔드(Next.js dev) → 백엔드 CORS. 운영에서는 CORS_ALLOWED_ORIGINS 로 주입(쉼표 다중).
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# 회원/SNS 로그인. 크로스오리진 → JWT in-header. JWT_SECRET 미주입 시 dev 기본값(운영 금지).
auth:
  jwt:
    secret: ${JWT_SECRET:dev-insecure-jwt-secret-change-me-0123456789abcdef}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:10080}   # 7일
  web-url: ${APP_WEB_URL:http://localhost:3000}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
    naver:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}

# CLI 비교 엔진 — 구독형 CLI 를 서브프로세스로 실행. 각 provider command/runner 는 cli_provider 카탈로그.
cli:
  timeout-seconds: ${CLI_TIMEOUT_SECONDS:120}
  parallel: ${CLI_PARALLEL:true}
  # 카탈로그 command 의 첫 토큰(논리 바이너리명) → 실제 실행 경로 매핑.
  # 값이 단순 명령(claude)이면 PATH 탐색, 절대경로면 그대로.
  bins:
    claude: ${CLI_CLAUDE_BIN:claude}
    agy: ${CLI_AGY_BIN:agy}
    codex: ${CLI_CODEX_BIN:codex}
  # API fallback (CLI 미설치 환경에서 Gemini 만 대체).
  gemini-api-key: ${GEMINI_API_KEY:}
  gemini-model: ${GEMINI_MODEL:gemini-2.5-flash-lite}

logging:
  level:
    com.mkclicompare: INFO
