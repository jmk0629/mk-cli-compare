# 로컬/단일 호스트 풀스택 실행. 운영 비밀은 .env(또는 환경변수)로 주입.
#   docker compose up --build
#
# ⚠️ 비교 엔진은 호스트에 설치·로그인된 CLI(claude/agy/codex)를 서브프로세스로 호출한다.
#    컨테이너 안에는 구독 인증된 CLI 가 없으므로, CLI 비교 기능을 실제로 쓰려면
#    백엔드를 **호스트에서** (`make backend`) 실행하는 것을 권장한다.
#    아래 compose 는 인증/카탈로그/투표 등 비-CLI 기능 데모용.
services:
  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8080"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-jwt-secret-change-me-0123456789abcdef}
      APP_WEB_URL: ${APP_WEB_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      CLI_TIMEOUT_SECONDS: ${CLI_TIMEOUT_SECONDS:-120}
      CLI_PARALLEL: ${CLI_PARALLEL:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
    volumes:
      - mkc-data:/data
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8080}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mkc-data:
